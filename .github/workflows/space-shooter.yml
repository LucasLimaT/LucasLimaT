name: Update Space Shooter

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5

      - name: Install package
        run: pip install "git+https://github.com/LucasLimaT/readme-retro-space.git#subdirectory=gh-space-shooter"

      - name: Generate WebP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh-space-shooter LucasLimaT --output gh-space-shooter.webp

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add gh-space-shooter.webp
          git diff --staged --quiet || git commit -m "Update space shooter game animation"
          git push
